<svg xmlns="http://www.w3.org/2000/svg"
     width="13" height="13" viewBox="0 0 13 13">
    <!-- Background -->
    <rect x="0" y="0" width="13" height="13" rx="2" ry="2"
          fill="#2B2D30"/>

    <!-- Incoming arrow (left) -->
    <path d="M3 3 L3 7 L1.8 5.8"
          fill="none"
          stroke="#4CAF50"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <path d="M3 7 L4.2 5.8"
          fill="none"
          stroke="#4CAF50"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Outgoing arrow (right) -->
    <path d="M10 6 L10 10 L8.8 8.8"
          fill="none"
          stroke="#FFB74D"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <path d="M10 10 L11.2 8.8"
          fill="none"
          stroke="#FFB74D"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Center broker node -->
    <circle cx="6.5" cy="6.5" r="1.6"
            fill="#42A5F5"/>
    <circle cx="6.5" cy="6.5" r="0.7"
            fill="#FFFFFF"/>
</svg>

